<!DOCTYPE html>
<html>

<head>

    <title>Tenant Form</title>
    <meta charset="UTF-8">
    <link
        rel="stylesheet"
        href="assets/styles.css">

</head>

<body>

<div class="container">

    <button
        class="back-btn"
        onclick="history.back()">

        Back

    </button>

    <h1>Tenant Form</h1>

    <form id="tenantForm">

        <input
            id="fullName"
            placeholder="Full Name"
            required>

        <input
            id="phone"
            placeholder="Phone"
            required>

        <input
            id="budget"
            type="number"
            placeholder="Budget"
            required>

        <select
            id="propertyType"
            required>
        </select>

        <h3>
            Preferred Locations
        </h3>

        <div
            id="locationsBox"
            class="checkbox-group">
        </div>

        <h3>
            Requirements
        </h3>

        <div
            id="requirementsBox"
            class="checkbox-group">
        </div>

        <select id="status">
        </select>

        <textarea
            id="notes"
            rows="4"
            placeholder="Notes">
        </textarea>

        <button
            type="submit"
            class="primary">

            Save Tenant

        </button>

    </form>

</div>

<script src="assets/constants.js"></script>
<script src="assets/storage.js"></script>
<script src="assets/ids.js"></script>
<script src="assets/navbar.js"></script>
<script src="assets/tenants.js"></script>

</body>
</html>
